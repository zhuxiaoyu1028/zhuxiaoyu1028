<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 天生学习法 · 蓝色适配测试</title>
    <!-- canvas-confetti 轻量撒花库 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #d4e8ff 0%, #b5d8ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
        }

        #app {
            width: 100%;
            max-width: 720px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 42px;
            box-shadow: 0 20px 40px rgba(0, 40, 100, 0.25), 0 6px 12px rgba(0, 30, 70, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.7);
            overflow: hidden;
            padding: 28px 24px;
            transition: all 0.2s ease;
        }

        .screen {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .hidden {
            display: none !important;
        }

        /* 标题与文字 */
        .brand-title {
            font-size: 2.1rem;
            font-weight: 600;
            color: #0b2b4f;
            letter-spacing: -0.5px;
            line-height: 1.2;
            text-align: center;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.6);
        }

        .brand-sub {
            font-size: 1.1rem;
            color: #1e4a7a;
            text-align: center;
            background: rgba(255,255,255,0.5);
            padding: 14px 18px;
            border-radius: 50px;
            backdrop-filter: blur(2px);
            border: 1px solid white;
            box-shadow: inset 0 1px 4px white;
        }

        .btn-start {
            background: #1469b3;
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: 600;
            padding: 20px 30px;
            border-radius: 60px;
            box-shadow: 0 12px 0 #0a3b62, 0 10px 20px rgba(0,50,100,0.3);
            cursor: pointer;
            transition: all 0.08s linear;
            margin-top: 20px;
            border: 2px solid #97c8ff;
            letter-spacing: 2px;
        }

        .btn-start:active {
            transform: translateY(6px);
            box-shadow: 0 6px 0 #0a3b62, 0 8px 16px rgba(0,50,100,0.25);
        }

        /* 题目卡片 */
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-size: 1rem;
            color: #0b3a5a;
            background: rgba(255,255,255,0.7);
            padding: 12px 20px;
            border-radius: 40px;
            border: 1px solid white;
            font-weight: 500;
        }

        .progress-badge {
            background: #1469b3;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
        }

        .question-text {
            background: white;
            padding: 32px 24px;
            border-radius: 36px;
            font-size: 1.4rem;
            line-height: 1.5;
            font-weight: 500;
            color: #01233c;
            box-shadow: 0 6px 0 #bed9ff, 0 16px 28px -12px #265d96;
            border: 1px solid #cce4ff;
        }

        .rating-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rating-scale {
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
            color: #1e4f7a;
            font-weight: 500;
        }

        .rating-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .rating-btn {
            width: 64px;
            height: 64px;
            border-radius: 64px;
            background: white;
            border: 3px solid #a2c9ff;
            font-size: 2rem;
            font-weight: 600;
            color: #0b3f6b;
            box-shadow: 0 6px 0 #7dafe0;
            cursor: pointer;
            transition: 0.06s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .rating-btn.selected {
            background: #1469b3;
            border-color: #f9ffff;
            color: white;
            box-shadow: 0 4px 0 #073457;
            transform: translateY(2px);
        }

        .rating-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #5d92c7;
        }

        .nav-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .btn-prev {
            background: #e6f0ff;
            border: 2px solid #1469b3;
            color: #1469b3;
            padding: 14px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: 0.1s;
        }

        .btn-prev:active {
            background: #c2dcff;
        }

        .btn-prev:disabled {
            opacity: 0.3;
            pointer-events: none;
            border-color: #a0b9d6;
        }

        /* 结果页 */
        .result-header {
            font-size: 2.2rem;
            font-weight: 600;
            color: #05315a;
            text-align: center;
            line-height: 1.3;
        }

        .dancing-people {
            display: flex;
            justify-content: center;
            gap: 18px;
            font-size: 3rem;
            filter: drop-shadow(0 8px 10px #5190d0);
            margin: 10px 0 5px;
        }

        .dancing-people span {
            display: inline-block;
            animation: bounce 1.2s infinite ease-in-out alternate;
            transform-origin: center;
        }

        .dancing-people span:nth-child(2) { animation-delay: 0.2s; }
        .dancing-people span:nth-child(3) { animation-delay: 0.4s; }
        .dancing-people span:nth-child(4) { animation-delay: 0.1s; }
        .dancing-people span:nth-child(5) { animation-delay: 0.5s; }

        @keyframes bounce {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-18px) rotate(5deg); }
        }

        .method-card {
            background: white;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border-left: 12px solid #3d8cd5;
            box-shadow: 0 12px 20px -14px #0f4674;
        }

        .method-name {
            font-size: 1.9rem;
            font-weight: 600;
            color: #114e7c;
            margin-bottom: 10px;
        }

        .method-desc {
            font-size: 1.2rem;
            color: #02457a;
            margin-bottom: 14px;
            line-height: 1.4;
        }

        .method-origin {
            background: #e2efff;
            padding: 14px 18px;
            border-radius: 28px;
            color: #0b3355;
            font-weight: 450;
            border: 1px solid #aac9fc;
        }

        .btn-restart {
            background: white;
            border: 3px solid #1469b3;
            color: #1469b3;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 18px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            transition: 0.1s;
            margin-top: 18px;
        }

        .btn-restart:active {
            background: #c7dfff;
        }

        .footnote {
            text-align: center;
            color: #1b5585;
            margin-top: 12px;
            font-size: 0.95rem;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 欢迎屏 -->
        <div id="welcome-screen" class="screen">
            <div class="brand-title">🧠 找出与你天生契合<br>的顶尖学习法</div>
            <div class="brand-sub">根据真实感受选择，答案无对错。</div>
            <button class="btn-start" id="start-test">✨ 开始测试 ✨</button>
            <div class="footnote" style="margin-top:24px;">8种方法 · 40题 · 约5分钟</div>
        </div>

        <!-- 问卷屏 (初始隐藏) 去掉了右上角方法名称 -->
        <div id="question-screen" class="screen hidden">
            <div class="question-header">
                <span id="question-index">第 1 / 40 题</span>
                <!-- 原先的 progress-badge 已移除 -->
            </div>
            <div class="question-text" id="question-text">加载题目中...</div>
            <div class="rating-container">
                <div class="rating-scale">
                    <span>1 非常不同意</span>
                    <span>5 非常同意</span>
                </div>
                <div class="rating-buttons" id="rating-buttons">
                    <!-- 由js生成 1~5 -->
                </div>
            </div>
            <div class="nav-row">
                <button class="btn-prev" id="prev-btn" disabled>◀ 上一题</button>
                <span style="color:#1b4f7a; font-weight:500;" id="hint-auto">点击数字自动跳转</span>
            </div>
        </div>

        <!-- 结果屏 (初始隐藏) -->
        <div id="result-screen" class="screen hidden">
            <div class="dancing-people" id="people-animation">
                <span>🧘</span><span>🏃</span><span>💃</span><span>🤸</span><span>🧗</span>
            </div>
            <div id="result-title" class="result-header">🎉 恭喜你 🎉</div>
            <div id="method-list" class="method-list" style="margin-top: 12px;"></div>
            <button class="btn-restart" id="restart-btn">🔄 重新测试</button>
        </div>
    </div>

    <script>
        (function() {
            // ---------- 题目数组 (按顺序 1~40) ----------
            const questions = [
                // 费曼学习法 (1-5)
                "当我学习新概念时，我会试着用最简单的话把它解释给一个外行听。",
                "我经常通过联想生活中的例子来帮助理解抽象的理论。",
                "如果我不能用一两句话把刚学的知识说清楚，我会觉得自己还没掌握。",
                "我乐于通过向他人讲解或参与学习小组来检验自己的理解程度。",
                "我会用类比的方法来加深对复杂概念的理解，比如“这就像……”。",
                // 番茄钟学习法 (6-10)
                "我很难保持专注超过半小时，容易走神或想其他事情。",
                "我会把学习任务分成25-30分钟的小块，每块结束后短暂休息。",
                "使用计时器或手机倒计时功能能让我更专注地投入学习。",
                "对于复杂任务，我会分解成多个可以在一两个番茄钟内完成的小任务。",
                "长时间学习时，我需要穿插多次短暂休息来维持效率。",
                // 艾宾浩斯学习法 (11-15)
                "我深信定期复习是防止遗忘最有效的方法。",
                "我会按照学完后1小时、1天、1周、1个月这样的间隔来安排复习。",
                "我习惯使用闪卡（纸质或App）并按照遗忘曲线重复记忆。",
                "我担心知识随时间流逝而遗忘，因此会主动制定详细的复习计划。",
                "我认为只有通过反复激活大脑中的记忆痕迹，才能把知识固化。",
                // 康奈尔5R笔记法 (16-20)
                "我记笔记时通常会把页面分成主栏、副栏和总结栏（比如左侧关键词、右侧内容、底部概要）。",
                "课后或阅读后，我会花时间整理笔记，用自己的话提炼要点并写下摘要。",
                "我习惯用标题、编号、列表等方式让笔记结构清晰，便于日后复习。",
                "我会通过遮挡笔记的一部分（如右侧内容），根据关键词尝试回忆详细内容来测试自己。",
                "我复习笔记时通常会重点关注自己总结的摘要和关键词。",
                // SQ3R学习法 (21-25)
                "在详细阅读一章之前，我会先浏览标题、图表、粗体字、摘要和章节问题。",
                "阅读时，我会把标题转换成问题，并带着这些问题去寻找答案。",
                "读完一个部分后，我会试着合上书，用自己的话复述刚才读到的要点。",
                "我会在阅读后回顾并回答最初提出的问题，检查自己是否理解。",
                "我会将新信息与已有知识相联系，以加深理解并形成知识网络。",
                // 提问学习法 (26-30)
                "我对新事物充满好奇，脑子里常常冒出“为什么”、“如果…会怎样”这类问题。",
                "学习新主题时，我会先列出一系列问题，然后通过查找资料或思考来解答。",
                "我经常通过自问自答来检验自己对材料的理解程度。",
                "我习惯在书本或资料边缘写下自己的疑问和思考。",
                "我认为通过不断提问可以触及知识的深层本质，而不仅仅是表面。",
                // FASTER学习法 (31-35)
                "开始学习新领域前，我会努力放下已有的成见和预设，以初学者心态面对。",
                "学习时，我会主动做笔记、画概念图、模拟练习，而不是仅仅被动阅读或听讲。",
                "我会刻意调整自己的姿势、呼吸和情绪，使自己处于积极的学习状态。",
                "我会想象学完后需要向别人讲解这些知识，以此来激励自己更深入地学习。",
                "我会在日历或计划表上专门为学习任务预留时间，并严格遵守。",
                // 西蒙学习法 (36-40)
                "我喜欢集中一大块连续时间（比如整个上午）深入学习一个主题，而不是分散到每天一点点。",
                "我认为短期内高强度投入比长期低强度分散学习效果更好。",
                "如果对某领域感兴趣，我会连续几天投入大量时间集中攻克，直到有明显进展。",
                "我擅长在短时间内快速掌握一门新知识或技能的基础。",
                "我相信持续专注学习数小时比断断续续学一整天更高效。"
            ];

            // 八个学习方法的信息 (索引0~7)
            const methods = [
                {
                    name: "费曼学习法",
                    desc: "通过简化、类比和教授他人来加深理解，强调“如果你不能简单地解释它，你就还没有真正理解它”。",
                    origin: "由来：诺贝尔物理学奖得主理查德·费曼自创的学习技巧，他常用简单的语言解释复杂物理概念。"
                },
                {
                    name: "番茄钟学习法",
                    desc: "以25分钟专注工作+5分钟休息为一个循环，帮助维持注意力，减少拖延。",
                    origin: "由来：弗朗西斯科·西里洛在1980年代用番茄形状计时器创立，风靡全球的效率工具。"
                },
                {
                    name: "艾宾浩斯学习法",
                    desc: "根据遗忘曲线在特定时间点（1h,1d,1w,1m）复习，巩固长期记忆。",
                    origin: "由来：德国心理学家赫尔曼·艾宾浩斯发现遗忘曲线，提出间隔重复对抗遗忘。"
                },
                {
                    name: "康奈尔5R笔记法",
                    desc: "结构化笔记（关键词栏、内容栏、总结栏），结合记录、简化、背诵、思考和复习。",
                    origin: "由来：康奈尔大学Walter Pauk教授于1940年代开发，旨在提升笔记效率与复习效果。"
                },
                {
                    name: "SQ3R学习法",
                    desc: "浏览(Survey)、提问(Question)、阅读(Read)、复述(Recite)、复习(Review)五步阅读法。",
                    origin: "由来：美国教育家Francis P. Robinson于1946年提出，帮助深度理解教科书。"
                },
                {
                    name: "提问学习法",
                    desc: "以问题为驱动力，通过不断追问“为什么、如何、如果”来层层剖析知识。",
                    origin: "由来：根植于苏格拉底式提问，现代认知科学证明提问能极大增强主动学习。"
                },
                {
                    name: "FASTER学习法",
                    desc: "Forget(清零)、Act(行动)、State(状态)、Teach(教授)、Enter(输入)、Review(复习)六步法。",
                    origin: "由来：大脑教练Jim Kwik综合多种记忆法推广，强调心态与主动参与。"
                },
                {
                    name: "西蒙学习法",
                    desc: "短时间内高强度、高密度集中学习一门知识，像锥子一样凿透。",
                    origin: "由来：诺贝尔奖得主赫伯特·西蒙提倡“锥形学习法”，6个月可掌握任一领域。"
                }
            ];

            // ---------- 状态 ----------
            let answers = new Array(40).fill(null);        // 存储1-5分
            let currentIndex = 0;                           // 0~39
            let totalQuestions = questions.length;

            // DOM 元素
            const welcomeScreen = document.getElementById('welcome-screen');
            const questionScreen = document.getElementById('question-screen');
            const resultScreen = document.getElementById('result-screen');
            const startBtn = document.getElementById('start-test');
            const prevBtn = document.getElementById('prev-btn');
            const questionText = document.getElementById('question-text');
            const questionIndexSpan = document.getElementById('question-index');
            const ratingButtonsDiv = document.getElementById('rating-buttons');
            const methodListDiv = document.getElementById('method-list');
            const resultTitle = document.getElementById('result-title');
            const restartBtn = document.getElementById('restart-btn');

            // ---------- 辅助函数 ----------
            // 不再需要 getPartName，因为它只用于右上角指示器

            // 渲染当前题目 (currentIndex)
            function renderQuestion() {
                // 更新文本
                questionText.innerText = questions[currentIndex];
                questionIndexSpan.innerText = `第 ${currentIndex + 1} / 40 题`;

                // 生成1-5按钮
                let htmlStr = '';
                for (let i = 1; i <= 5; i++) {
                    const selectedClass = (answers[currentIndex] === i) ? 'selected' : '';
                    htmlStr += `<div class="rating-btn ${selectedClass}" data-value="${i}">${i}</div>`;
                }
                ratingButtonsDiv.innerHTML = htmlStr;

                // 添加按钮事件
                document.querySelectorAll('.rating-btn').forEach(btn => {
                    btn.addEventListener('click', function (e) {
                        const val = parseInt(this.dataset.value, 10);
                        // 更新当前答案
                        answers[currentIndex] = val;

                        // 刷新按钮高亮
                        renderQuestion(); // 重新渲染当前题以显示选中

                        // 自动跳转逻辑
                        if (currentIndex < totalQuestions - 1) {
                            // 下一题
                            currentIndex++;
                            renderQuestion();
                        } else {
                            // 已经是最后一题，且用户刚刚选了值 -> 跳转结果页
                            showResult();
                        }
                    });
                });

                // 上一题按钮状态
                prevBtn.disabled = (currentIndex === 0);
            }

            // 计算并展示结果页
            function showResult() {
                // 检查是否所有题都填了 (若强行通过上一题返回可能导致null, 但正常流程不会)
                for (let i = 0; i < totalQuestions; i++) {
                    if (answers[i] === null) {
                        // 极少数情况：如果有未填，则默认置为3（中立），保证不报错
                        answers[i] = 3;
                    }
                }

                // 计算各部分总分 (8个部分)
                const scores = [0, 0, 0, 0, 0, 0, 0, 0];
                for (let i = 0; i < totalQuestions; i++) {
                    const part = Math.floor(i / 5);
                    scores[part] += answers[i];
                }

                // 找到最高分
                const maxScore = Math.max(...scores);
                // 收集所有等于最高分的part索引
                const bestParts = [];
                for (let p = 0; p < scores.length; p++) {
                    if (scores[p] === maxScore) bestParts.push(p);
                }

                // 生成结果标题
                if (bestParts.length === 1) {
                    resultTitle.innerHTML = `🎉 恭喜你，最适合你的学习方法是 🎉`;
                } else {
                    resultTitle.innerHTML = `🎉 恭喜你，适合你的学习方法有 ${bestParts.length} 种 🎉`;
                }

                // 生成方法卡片
                let methodsHtml = '';
                bestParts.forEach(partIndex => {
                    const m = methods[partIndex];
                    methodsHtml += `
                        <div class="method-card">
                            <div class="method-name">📘 ${m.name}</div>
                            <div class="method-desc">${m.desc}</div>
                            <div class="method-origin">${m.origin}</div>
                        </div>
                    `;
                });
                methodListDiv.innerHTML = methodsHtml;

                // 切换屏幕
                welcomeScreen.classList.add('hidden');
                questionScreen.classList.add('hidden');
                resultScreen.classList.remove('hidden');

                // 撒花庆祝 (使用canvas-confetti)
                confetti({ particleCount: 120, spread: 100, origin: { y: 0.6 } });
                setTimeout(() => {
                    confetti({ particleCount: 80, spread: 160, origin: { y: 0.5, x: 0.3 }, colors: ['#2a7fdd', '#f4f9ff'] });
                }, 200);
                setTimeout(() => {
                    confetti({ particleCount: 100, spread: 120, origin: { y: 0.5, x: 0.8 } });
                }, 400);
            }

            // 重置测试回到欢迎页
            function resetToWelcome() {
                // 重置答案
                answers = new Array(40).fill(null);
                currentIndex = 0;
                welcomeScreen.classList.remove('hidden');
                questionScreen.classList.add('hidden');
                resultScreen.classList.add('hidden');
            }

            // ---------- 事件绑定 ----------
            startBtn.addEventListener('click', () => {
                // 重置答案 (全新测试)
                answers = new Array(40).fill(null);
                currentIndex = 0;
                // 显示问卷
                welcomeScreen.classList.add('hidden');
                resultScreen.classList.add('hidden');
                questionScreen.classList.remove('hidden');
                renderQuestion();
            });

            prevBtn.addEventListener('click', () => {
                if (currentIndex > 0) {
                    currentIndex--;
                    renderQuestion();
                }
            });

            restartBtn.addEventListener('click', resetToWelcome);

            // 初始渲染欢迎屏可见，问卷和结果隐藏，已经满足。
        })();
    </script>
</body>
</html>
